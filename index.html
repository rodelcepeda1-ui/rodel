<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodel P. Cepeda | Portfolio</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #f0f7ff;
            color: #1e293b;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #1e3a8a;
            padding: 1rem 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .nav-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-button {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-button:hover {
            background-color: #3b82f6;
            transform: translateY(-2px);
        }

        section {
            min-height: 100vh;
            padding: 120px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 2.5rem;
            color: #1e3a8a;
            margin-bottom: 40px;
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content { padding: 20px; text-align: center; }

        #home {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            justify-content: center;
        }

        .profile-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            margin-bottom: 20px;
        }

        .btn-action {
            background-color: #2563eb;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin: 5px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-facebook { background-color: #1877f2; }
        .btn-gmail { background-color: #ea4335; }

        /* --- CHATBOT STYLES --- */
        #chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        #chat-button {
            width: 60px;
            height: 60px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #chat-box {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 300px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header { background: #1e3a8a; color: white; padding: 15px; font-weight: bold; }
        #chat-messages { height: 200px; padding: 15px; overflow-y: auto; font-size: 14px; }
        #chat-input-area { display: flex; border-top: 1px solid #eee; }
        #chat-input { flex: 1; padding: 10px; border: none; outline: none; }

        @media (max-width: 768px) {
            .card-resume { flex-direction: column !important; }
            .resume-img { width: 100% !important; }
        }
    </style>
</
